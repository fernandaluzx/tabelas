<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 800px;
            border-collapse: collapse 
        }

        td {
            border: 1px solid black;
            height: 200px;
            text-align: center;
        }

        td.marcados {
            background-color: rgb(141, 153, 163);
            font-size: 100px;
        }
    </style>
</head>
<body>
    <h1>Minha primeira tabela</h1>
    <table>
<tr>
    <td class="marcados">A1</td>
    <td>B1</td>
    <td class="marcados">C1</td>
</tr>
<tr>
    <td>A2</td>
    <td class="marcados">B2</td>
    <td>C2</td>
</tr>
<tr>
    <td class="marcados">A3</td>
    <td>B3</td>
    <td class="marcados">C3</td>
</tr>
<tr>
    <td>A4</td>
    <td class="marcados">B4</td>
    <td>C4</td>
</tr>

    </table>
    
</body>
</html>
