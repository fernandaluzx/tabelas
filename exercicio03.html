<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício Prático</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 600px;
        }

        caption {
            font-size: 1.3em;
            font-weight: bold;
            padding: 10px;

        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exercício de Tabelas</h1>
    <table>
        <caption> Cantores Favoritos</caption>
      <thead>
          <tr>
              <th scope="col">Grupos</th>
              <th scope="col">Nomes</th>
              <th colspan="3" scope="colgroup">Cantores</th>
          </tr>
      </thead>
       <tbody>
           
           <tr>
               <th rowspan="2" scope="rowgroup">Mulheres</th>
               <td>Fernanda</td>
               <td>Justin Bieber</td>
               <td>Katy Perry</td>
               <td>Demi Lovato</td>
           </tr>
           <tr>
               <td>Victoria</td>
               <td>One Direction</td>
               <td>Billie Eilish</td>
               <td>Anitta</td>
           </tr>
           <tr>
               <th rowspan="2" scope="rowgroup">Homens</th>
               <td>Gabriel</td>
               <td>Eminem</td>
               <td>Imagine Dragons</td>
               <td>The Weeknd</td>
           </tr>
           <tr>
               <td>João</td>
               <td>Bruno Mars</td>
               <td>Beyonce</td>
               <td>Ariana Grande</td>
           </tr>
       </tbody>

        
    </table>
    
</body>
</html>
